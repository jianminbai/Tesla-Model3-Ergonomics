<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="690" viewBox="0 0 1200 690">
  <title>座椅高度受力变化图</title>
  <defs>
    <style>
      .title { font: 700 24px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 500 15px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #374151; }
      .label { font: 500 14px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #111827; }
      .small { font: 400 12px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #374151; }
      .tiny { font: 400 11px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #4b5563; }
      .seat { fill: #e5e7eb; stroke: #6b7280; stroke-width: 2; }
      .body { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .bone { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
      .normal { fill: #bfdbfe; stroke: #2563eb; stroke-width: 2; }
      .warn { fill: #fed7aa; stroke: #ea580c; stroke-width: 2; }
      .risk { fill: #fecaca; stroke: #dc2626; stroke-width: 2; }
      .ok { fill: #bbf7d0; stroke: #16a34a; stroke-width: 2; }
      .line { stroke: #374151; stroke-width: 2; fill: none; }
      .arrow { stroke: #374151; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .greenArrow { stroke: #16a34a; stroke-width: 3; fill: none; marker-end: url(#greenArrow); }
      .redArrow { stroke: #dc2626; stroke-width: 3; fill: none; marker-end: url(#redArrow); }
      .orangeArrow { stroke: #ea580c; stroke-width: 3; fill: none; marker-end: url(#orangeArrow); }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .note { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1.5; rx: 10; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151" />
    </marker>
    <marker id="greenArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a" />
    </marker>
    <marker id="redArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626" />
    </marker>
    <marker id="orangeArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ea580c" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="40" y="50" class="title">图 4：座椅高度变化对髋膝关系与受力的影响</text>
  <text x="40" y="82" class="subtitle">高度过低、适中、过高都会把压力搬到不同区域；目标是髋膝关系合理、脚跟稳定、无麻刺。</text>

  <g transform="translate(70,130)">
    <text x="105" y="0" class="label">偏低</text>
    <rect x="20" y="350" width="290" height="35" class="seat" rx="8"/>
    <circle cx="110" cy="250" r="30" class="body"/>
    <circle cx="185" cy="295" r="22" class="body"/>
    <circle cx="260" cy="340" r="18" class="body"/>
    <path d="M110 250 L185 295 L260 340" class="line"/>
    <path d="M110 250 L95 330" class="line"/>
    <ellipse cx="110" cy="345" rx="42" ry="16" class="risk"/>
    <text x="30" y="425" class="small">髋低于膝</text>
    <text x="30" y="450" class="small">骨盆后倾风险 ↑</text>
    <text x="30" y="475" class="small">坐骨后缘压力 ↑</text>
  </g>

  <g transform="translate(455,130)">
    <text x="105" y="0" class="label">适中</text>
    <rect x="20" y="330" width="290" height="35" class="seat" rx="8"/>
    <circle cx="115" cy="230" r="30" class="body"/>
    <circle cx="195" cy="285" r="22" class="body"/>
    <circle cx="270" cy="340" r="18" class="body"/>
    <path d="M115 230 L195 285 L270 340" class="line"/>
    <path d="M115 230 L125 325" class="line"/>
    <ellipse cx="130" cy="326" rx="36" ry="14" class="warn"/>
    <ellipse cx="215" cy="328" rx="62" ry="14" class="normal"/>
    <text x="30" y="425" class="small">髋膝接近或髋略高</text>
    <text x="30" y="450" class="small">坐骨 + 大腿分担</text>
    <text x="30" y="475" class="small">脚跟稳定</text>
  </g>

  <g transform="translate(840,130)">
    <text x="105" y="0" class="label">过高</text>
    <rect x="20" y="300" width="290" height="35" class="seat" rx="8"/>
    <circle cx="115" cy="205" r="30" class="body"/>
    <circle cx="205" cy="280" r="22" class="body"/>
    <circle cx="280" cy="350" r="18" class="body"/>
    <path d="M115 205 L205 280 L280 350" class="line"/>
    <path d="M115 205 L140 295" class="line"/>
    <ellipse cx="220" cy="300" rx="70" ry="17" class="risk"/>
    <text x="30" y="425" class="small">大腿后侧压力 ↑</text>
    <text x="30" y="450" class="small">腘窝 / 麻刺风险 ↑</text>
    <text x="30" y="475" class="small">脚跟稳定性可能下降</text>
  </g>

</svg>
